<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Calculator project">
	<title>Calculator</title>
</head>
<body>
	<header>
		<h1>Calculator</h1>
	</header>

	<main>
		
        <!-- Add calculator UI here -->
    <div id = 'display'>
        <div id = 'runningExpression'></div>
        <br>
        <div id='total'></div>
    </div>
    
        <div class = 'buttons'>
            <button onclick='buttonClicked(this.innerText)'>C</button>
            <button onclick='buttonClicked(this.innerText)'>⌫</button>
            <button onclick='buttonClicked(this.innerText)'>%</button>
            <button onclick='buttonClicked(this.innerText)'>/</button>
           

            <button onclick='buttonClicked(this.innerText)'>7</button>
            <button onclick='buttonClicked(this.innerText)'>8</button>
            <button onclick='buttonClicked(this.innerText)'>9</button>
            <button onclick='buttonClicked(this.innerText)'>*</button>
            

            <button onclick='buttonClicked(this.innerText)'>4</button>
            <button onclick='buttonClicked(this.innerText)'>5</button>
            <button onclick='buttonClicked(this.innerText)'>6</button>
            <button onclick='buttonClicked(this.innerText)'>-</button>

            

            <button onclick='buttonClicked(this.innerText)'>1</button>
            <button onclick='buttonClicked(this.innerText)'>2</button>
            <button onclick='buttonClicked(this.innerText)'>3</button>
            <button onclick='buttonClicked(this.innerText)'>+</button>
           

            <button onclick='buttonClicked(this.innerText)'>0</button>
            <button onclick='buttonClicked(this.innerText)'>.</button>
            <button onclick='buttonClicked(this.innerText)'>=</button>
            


        </div>
    <script src="script.js"></script>
	</main>

	<footer>
		<small>&copy; 2026 Calculator</small>
	</footer>
</body>
</html>
